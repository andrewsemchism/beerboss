name: Scrape Beer Data

on:
  schedule:
    - cron: "0 8 * * *" # 8am UTC = 4am ET daily
  workflow_dispatch: # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx

      - name: Run scraper
        run: python scripts/scrapeJSON.py

      - name: Move output to public/data
        run: mv beers.json public/data/beers.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/beers.json
          git diff --cached --quiet || git commit -m "chore: update beer data"
          git push
